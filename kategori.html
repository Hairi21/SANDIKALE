<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kategori Produk - SANDIKALE POS</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:#fff;
}
.btn{
    background:#2563eb;
}
.edit{
    background:#f59e0b;
}
.hapus{
    background:#dc2626;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th{
    background:#2563eb;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Data Kategori</h2>

<input
type="text"
id="namaKategori"
placeholder="Masukkan nama kategori">

<button
class="btn"
onclick="simpanKategori()">
Simpan
</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>No</th>

<th>Nama Kategori</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="listKategori">

</tbody>

</table>

</div>

</div>

<script>

let kategori=
JSON.parse(localStorage.getItem("kategori"))||[];

function tampilKategori(){

let html="";

kategori.forEach((item,index)=>{

html+=`

<tr>

<td>${index+1}</td>

<td>${item}</td>

<td>

<button
class="edit"
onclick="editKategori(${index})">
Edit
</button>

<button
class="hapus"
onclick="hapusKategori(${index})">
Hapus
</button>

</td>

</tr>

`;

});

document.getElementById("listKategori").innerHTML=html;

}

function simpanKategori(){

let nama=
document.getElementById("namaKategori").value.trim();

if(nama==""){

alert("Nama kategori belum diisi");

return;

}

kategori.push(nama);

localStorage.setItem(
"kategori",
JSON.stringify(kategori)
);

document.getElementById("namaKategori").value="";

tampilKategori();

}
