<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir SANDIKALE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Kasir SANDIKALE</h1>

<div class="card">

<label>Produk</label>

<select id="produk">
<option value="">Pilih Produk</option>
</select>

<label>Jumlah</label>

<input type="number" id="qty" value="1" min="1">

<label>Diskon</label>

<select id="diskon">
<option value="0">Tidak Ada</option>
<option value="5">5%</option>
<option value="10">10%</option>
<option value="20">20%</option>
</select>

<button onclick="tambahProduk()">
Tambah Produk
</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Produk</th>

<th>Qty</th>

<th>Harga</th>

<th>Subtotal</th>

</tr>

</thead>

<tbody id="keranjang">

</tbody>

</table>

<h2 id="total">
Total : Rp0
</h2>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
