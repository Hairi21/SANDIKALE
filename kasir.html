<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir - SANDIKALE PROJECT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Kasir</h1>

<div class="card">

<label>Produk</label>
<select id="produk"></select>

<label>Jumlah</label>
<input type="number" id="qty" value="1" min="1">

<label>Diskon (%)</label>
<select id="diskon">
<option value="0">0%</option>
<option value="5">5%</option>
<option value="10">10%</option>
<option value="20">20%</option>
</select>

<button onclick="tambahProduk()">
Tambah ke Keranjang
</button>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Produk</th>
<th>Qty</th>
<th>Harga</th>
<th>Subtotal</th>
</tr>
</thead>

<tbody id="keranjang">
</tbody>

</table>

<h2 id="total">
Total : Rp 0
</h2>

<button onclick="simpanTransaksi()">
Simpan Transaksi
</button>

</div>

<a href="dashboard.html">
<button>Kembali ke Dashboard</button>
</a>

</div>

<script src="app.js"></script>

</body>
</html>
