<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Produk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Data Produk</h1>

<div class="card">

<label>Nama Produk</label>
<input type="text" id="namaProduk">

<label>Kategori</label>
<input type="text" id="kategoriProduk">

<label>Harga Jual</label>
<input type="number" id="hargaProduk">

<button onclick="tambahDataProduk()">
Tambah Produk
</button>

</div>

<div class="card">

<table>

<thead>

<tr>
<th>Nama</th>
<th>Kategori</th>
<th>Harga</th>
<th>Hapus</th>
</tr>

</thead>

<tbody id="listProduk">

</tbody>

</table>

</div>

<a href="index.html">
<button>Kembali</button>
</a>

</div>

<script src="app.js"></script>

</body>
</html>

<button onclick="tampilProduk()">
Refresh Data
</button>
